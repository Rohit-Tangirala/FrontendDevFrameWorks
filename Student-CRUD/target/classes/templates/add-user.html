<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Profile Form</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 30px;
        }

        h1 {
            font-size: 40px;
            text-decoration: underline;
        }

        form {
            display: inline-block;
            text-align: left;
            margin-top: 20px;
        }

        label {
            display: inline-block;
            width: 120px;
            font-weight: bold;
        }

        input {
            padding: 6px;
            margin: 5px;
            width: 200px;
        }

        .btn {
            padding: 10px 20px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }

        .btn:hover {
            background: lightgray;
        }

        .buttons {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Student Profile</h1>

<form th:action="@{/saveUser}" th:object="${user}" method="post">

    <input type="hidden" th:field="*{id}"/>

    <div>
        <label>Roll No</label>
        <input type="text" th:field="*{rollno}" required>
    </div>

    <div>
        <label>Name</label>
        <input type="text" th:field="*{name}" required>
    </div>

    <div>
        <label>Gender</label>
        <input type="radio" th:field="*{gender}" value="Male" checked> Male
        <input type="radio" th:field="*{gender}" value="Female"> Female
    </div>

    <div>
        <label>DOB</label>
        <input type="date" th:field="*{dob}" required>
    </div>

    <div>
        <label>Contact No</label>
        <input type="text" th:field="*{contactNo}" required>
    </div>

    <div>
        <label>Email</label>
        <input type="email" th:field="*{email}" required>
    </div>

    <div class="buttons">
        <button type="submit" class="btn">Submit</button>
        <a th:href="@{/}">
            <button type="button" class="btn">Display</button>
        </a>
    </div>

</form>

</body>
</html>
